appUrl: https://authn.example.com
routingMode: subdomain
defaultFromEmail: no-reply@authn.example.com

image:
  repository: ghcr.io/authn-sh/authn
  tag: "0.3.0"

replicaCount:
  web: 2
  worker: 1

env:
  MAIL_HOST: email-smtp.us-east-1.amazonaws.com
  MAIL_PORT: "587"
  MAIL_FROM_NAME: authn.sh

secrets:
  values:
    APP_KEY: ""
    AUTHN_BOOTSTRAP_ADMIN_EMAIL: op@example.com
    AUTHN_BOOTSTRAP_ADMIN_PASSWORD: change-me-please
    AUTHN_BOOTSTRAP_WORKSPACE_NAME: My workspace
    MAIL_PASSWORD: ""

database:
  enabled: true
  instanceClass: t4g
  instanceSize: small
  multiAz: true
  storageGb: 20

cache:
  enabled: true
  nodeType: cache.t4g.micro
  multiAz: true

edge:
  hostedZoneId: ""
  hostedZoneName: ""
  cloudFront: false
  customDomainDriver: manual
  waf: true

bootstrap:
  enabled: true

scheduler:
  enabled: true

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10

observability:
  logRetentionDays: 90
  alarmEmail: ""

network:
  vpcCidr: 10.0.0.0/16
  maxAzs: 3
  natGateways: 1

# SMS engine (v0.4+). Driver defaults to "null" — set to "twilio" or "vonage"
# to dispatch real verification codes for phone-number sign-up and the
# phone_code second factor. Auth-token / api-secret are referenced via
# Secrets Manager ARNs and surfaced as ECS secrets on web + worker.
#
# sms:
#   driver: twilio
#   fromNumber: "+15551234567"
#   twilio:
#     accountSid: ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#     authTokenSecretArn: arn:aws:secretsmanager:us-east-1:123456789012:secret:authn-twilio-AbCdEf
#     messagingServiceSid: MGxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
sms:
  driver: "null"
